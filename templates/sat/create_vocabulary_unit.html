{% extends 'template.html' %}
{% load static %}

{% block title-main %}Create Vocabulary Unit{% endblock title-main %}
{% block title %}Create Unit{% endblock title %}

{% block style %}
<style>
  .form-wrap {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.08);
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 700;
    color: #324dc7;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 12px 14px;
  }

  .btn-main {
    display: inline-block;
    padding: 12px 18px;
    border-radius: 999px;
    background: #324dc7;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    border: none;
    cursor: pointer;
  }

  .btn-secondary {
    background: #475569;
  }
</style>
{% endblock style %}

{% block content %}
<div class="form-wrap">
  <h2>Create Vocabulary Unit</h2>

  <form method="post" action="{% url 'create_vocabulary_unit' %}">
    {% csrf_token %}

    <div class="form-group">
      <label for="order">Unit Order</label>
      <input type="number" id="order" name="order" required>
    </div>

    <div class="form-group">
      <label for="title">Unit Title</label>
      <input type="text" id="title" name="title" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4"></textarea>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button type="submit" class="btn-main">Create Unit</button>
      <a href="{% url 'teacher_vocabulary_units' %}" class="btn-main btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock content %}
