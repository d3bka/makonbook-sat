<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block title %}Makon Book Dashboard{% endblock title %}</title>
  {% load static %}
  <link href="{% static 'assets/img/icons/original-icon-nobg.png' %}" rel="icon">
  <link rel="stylesheet" href="{% static 'assets/css/makon-dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'font-awesome-4.7.0/css/font-awesome.min.css' %}">
  {% block style %}
  <style>
    /* Add additional custom CSS here */
  </style>
  {% endblock style %}
</head>
<body>
  {% block header %}
  <!-- Header content goes here -->
  {% endblock header %}

  {% block content %}
  <!-- Main dashboard content goes here -->
  {% endblock content %}

  {% block scripts %}
  <!-- Include necessary JS libraries -->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
  {% endblock scripts %}
</body>
</html>
