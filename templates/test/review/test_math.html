<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Review</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/contrib/auto-render.min.js"></script>

    <style>
        .answered-incorrect > label {
            color: red;
            font-weight: bold;
        }

        .answer-correct > label {
            color: green !important;
            font-weight: bold;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        main {
            font-family: 'Times New Roman', Times, serif;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none !important;
        }

        p {
            font-family: 'Times New Roman', Times, serif;
        }

        .container {
            max-width: 1300px;
            margin: 10px auto;
            padding: 20px;
            background-color: #ffffff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px dashed black;
            padding-bottom: 10px;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        main {
            min-height: 400px;
            display: flex;
            margin-top: 20px;
        }

        .question-container {
            overflow-y: auto;
            flex: 1;
            padding-right: 20px;
            border-right: 1px dashed #cccccc;
        }

        .answers-container {
            overflow-y: auto;
            flex: 1;
            padding-left: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #cccccc;
            padding-bottom: 10px;
        }

        .question-number {
            font-size: 20px;
            font-weight: bold;
        }

        .question-text {
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        footer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            border-top: 3px dashed black;
            padding-top: 10px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        .nav-button:hover {
            background-color: #0056b3;
        }

        .choice-container {
            cursor: default;
            padding: 10px;
            border: 1px #505050 solid;
            color: #505050;
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            border-radius: 10px;
            min-height: 50px;
        }

        .choice-container input[type="radio"],
        .choice-container input[type="text"] {
            display: none;
        }

        .choice-container label {
            width: 100%;
            position: relative;
            padding-left: 35px;
            cursor: default;
        }

        .choice-container .mark::before {
            content: attr(data-letter);
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 25px;
            height: 25px;
            border: 1px solid #000;
            border-radius: 50%;
            text-align: center;
            line-height: 23px;
            background-color: #fff;
        }

        .choice-container input[type="radio"]:checked + label::before {
            background-color: #0056b3;
            border: 2px solid #000;
            color: #fff;
        }

        .choice-container input[type="radio"]:checked + label,
        .choice-container input[type="text"]:checked + label {
            color: black;
            font-weight: bold;
        }

        .graph {
            width: 80%;
            margin-top: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
        }

        .choice-image {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            display: block;
            margin: 6px 0;
        }

        .review-answer-box {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #f9fafb;
            font-size: 18px;
            min-height: 24px;
        }

        .review-meta {
            margin-top: 16px;
        }

        .review-meta h3,
        .review-meta p {
            margin: 10px 0;
        }

        .katex {
            font-size: 1.2em;
        }

        mjx-container {
            margin: 5px 0;
        }

        @media (max-width: 900px) {
            main {
                flex-direction: column;
            }

            .question-container {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px dashed #cccccc;
                padding-bottom: 20px;
                margin-bottom: 20px;
            }

            .answers-container {
                padding-left: 0;
            }
        }
    </style>
</head>
<body class="scroll-hide">
    <div class="container">
        <header>
            <a href="/sat/results/{{test}}" style="text-decoration: none; color:black;"><h1>Question Review</h1></a>
            <h1 style="color: green;">Answer: {{ question.answer }}</h1>
            <h1 style="color: gray;">Your Answer: {{ answered|default_if_none:"" }}</h1>
        </header>

        <main>
            <div class="question-container scroll-hide">
                <div class="just-div" id="graph-container"></div>
                <p id="passage"></p>

                <div class="review-meta">
                    <h3>Domain: {{ question.domain }}</h3>
                    <h3>Type: {{ question.type }}</h3>
                    <p>Explanation:</p>
                    <div id="explanation">{{ question.get_exp|safe }}</div>
                </div>
            </div>

            <div class="answers-container scroll-hide">
                <div class="question-header">
                    <div class="question-number">Question Number: <span id="question-number"></span></div>
                </div>

                <div class="question-text" id="question-text"></div>
                <div class="answers" id="answers"></div>
            </div>
        </main>

        <footer>
            {% if prev %}
            <a href="{{ prev }}"><button type="button" class="nav-button">Back</button></a>
            {% else %}
            <a href="/sat/results/{{test}}"><button type="button" class="nav-button">Back</button></a>
            {% endif %}

            {% if next %}
            <a href="{{ next }}"><button type="button" class="nav-button">Next</button></a>
            {% endif %}
        </footer>
    </div>

    <script>
        function fixLatex(text) {
            if (!text) return '';

            let cleaned = String(text);
            cleaned = cleaned.replace(/\\\$/g, '$');
            cleaned = cleaned.replace(/\\\\/g, '\\');
            cleaned = cleaned.replace(/\\text\{([^}]+)\}/g, '\\text{$1}');
            cleaned = cleaned.replace(/\\mathrm\{([^}]+)\}/g, '\\mathrm{$1}');
            cleaned = cleaned.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '\\frac{$1}{$2}');
            cleaned = cleaned.replace(/\\\(\s*/g, '\\(');
            cleaned = cleaned.replace(/\s*\\\)/g, '\\)');
            cleaned = cleaned.replace(/\\\[\s*/g, '\\[');
            cleaned = cleaned.replace(/\s*\\\]/g, '\\]');
            return cleaned;
        }

        function renderMath(root = document.body) {
            try {
                renderMathInElement(root, {
                    delimiters: [
                        { left: "\\(", right: "\\)", display: false },
                        { left: "\\[", right: "\\]", display: true }
                    ]
                });
            } catch (error) {
                console.error('KaTeX render failed:', error);
            }
        }

        function setChoiceContent(element, content) {
            let renderedContent = fixLatex(content || '');

            if (renderedContent.startsWith('IMAGE:')) {
                const imageUrl = renderedContent.slice(6);
                element.innerHTML = `<img class="choice-image" src="${imageUrl}" alt="Choice">`;
                return;
            }

            element.innerHTML = renderedContent;
        }

        const questions = [
            {
                id: '{{ question.id|escapejs }}',
                passage: `{{ question.passage|default_if_none:""|escapejs }}`,
                number: Number(`{{ question.number }}`),
                question: `{{ question.question|default_if_none:""|escapejs }}`,
                a: `{{ question.get_a|default_if_none:""|escapejs }}`,
                b: `{{ question.get_b|default_if_none:""|escapejs }}`,
                c: `{{ question.get_c|default_if_none:""|escapejs }}`,
                d: `{{ question.get_d|default_if_none:""|escapejs }}`,
                type: `{{ question.written|escapejs }}`,
                graph: `{{ question.get_graph|default_if_none:""|escapejs }}`
            }
        ];

        const userAnswer = `{{ answered|default_if_none:""|escapejs }}`;
        const correctAnswer = `{{ question.answer|default_if_none:""|escapejs }}`;

        function renderChoices(question) {
            const answersContainer = document.getElementById('answers');

            if (question.type === 'True') {
                answersContainer.innerHTML = `
                    <div class="review-answer-box">${userAnswer || 'No answer'}</div>
                `;
                return;
            }

            answersContainer.innerHTML = `
                <label class="choice-container A">
                    <input type="radio" disabled ${userAnswer === 'A' ? 'checked' : ''}>
                    <label class="mark" data-letter="A"></label>
                    <label class="choice-a"></label>
                </label>
                <label class="choice-container B">
                    <input type="radio" disabled ${userAnswer === 'B' ? 'checked' : ''}>
                    <label class="mark" data-letter="B"></label>
                    <label class="choice-b"></label>
                </label>
                <label class="choice-container C">
                    <input type="radio" disabled ${userAnswer === 'C' ? 'checked' : ''}>
                    <label class="mark" data-letter="C"></label>
                    <label class="choice-c"></label>
                </label>
                <label class="choice-container D">
                    <input type="radio" disabled ${userAnswer === 'D' ? 'checked' : ''}>
                    <label class="mark" data-letter="D"></label>
                    <label class="choice-d"></label>
                </label>
            `;

            setChoiceContent(document.querySelector('.choice-a'), question.a);
            setChoiceContent(document.querySelector('.choice-b'), question.b);
            setChoiceContent(document.querySelector('.choice-c'), question.c);
            setChoiceContent(document.querySelector('.choice-d'), question.d);

            document.querySelectorAll('.choice-container').forEach(container => {
                container.classList.remove('answered-incorrect', 'answer-correct');
            });

            if (correctAnswer) {
                const correctContainer = document.querySelector(`.choice-container.${correctAnswer}`);
                if (correctContainer) {
                    correctContainer.classList.add('answer-correct');
                }
            }

            if (userAnswer && userAnswer !== correctAnswer) {
                const userContainer = document.querySelector(`.choice-container.${userAnswer}`);
                if (userContainer) {
                    userContainer.classList.add('answered-incorrect');
                }
            }
        }

        function loadQuestion(index) {
            const question = questions[index];
            document.getElementById('question-number').innerText = question.number;
            document.getElementById('passage').innerHTML = fixLatex(question.passage);
            document.getElementById('question-text').innerHTML = fixLatex(question.question);

            const graphContainer = document.getElementById('graph-container');
            graphContainer.innerHTML = question.graph
                ? `<div class="graph"><img src="${question.graph}" alt="Graph" style="width:100%;"></div>`
                : '';

            renderChoices(question);
            renderMath(document.body);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadQuestion(0);
            renderMath(document.getElementById('explanation'));
        });

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('selectstart', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.ctrlKey && ['u', 's', 'p', 'c', 'j', 'i'].includes(event.key.toLowerCase())) {
                event.preventDefault();
            }
            if (event.key === 'F12') {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
