# Nginx configuration for MakonBook SAT System
# Domain: makonbook.satmakon.com

upstream makonbook_app {
    server unix:/home/satmakon/makonbook/makonbook.sock fail_timeout=0;
}

# HTTP configuration (temporary - will be updated to HTTPS after SSL setup)
server {
    listen 80;
    server_name makonbook.satmakon.com localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.desmos.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https: blob:;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Client upload limit (for large test files)
    client_max_body_size 100M;

    # Root directory
    root /home/satmakon/makonbook;

    # Access and error logs - use local logs directory
    access_log /home/satmakon/makonbook/logs/nginx_access.log;
    error_log /home/satmakon/makonbook/logs/nginx_error.log;

    # Serve static files directly
    location /static/ {
        alias /home/satmakon/makonbook/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve media files (local fallback)
    location /media/ {
        alias /home/satmakon/makonbook/media/;
        expires 1M;
        add_header Cache-Control "public";
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Django application
    location / {
        try_files $uri @proxy_to_app;
    }

    location @proxy_to_app {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_buffering off;
        proxy_pass http://makonbook_app;
    }
}